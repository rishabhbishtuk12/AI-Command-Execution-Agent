<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator - Game of Thrones Fan Site</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header class="animate__animated animate__fadeInDown" style="background-color: #8B0000; color: white; text-align: center; padding: 20px 0;">
        <h1>Westeros Calculator</h1>
    </header>
    <nav style="background-color: #2F4F4F;">
        <ul style="list-style-type: none; padding: 0; margin: 0; display: flex; justify-content: center;">
            <li style="margin: 0 15px;"><a style="color: white; text-decoration: none;" href="../index.html">Home</a></li>
            <li style="margin: 0 15px;"><a style="color: white; text-decoration: none;" href="calculator.html">Calculator</a></li>
            <li style="margin: 0 15px;"><a style="color: white; text-decoration: none;" href="quiz.html">Quiz Game</a></li>
        </ul>
    </nav>
    <main style="text-align: center; padding: 30px;">
        <div id="calculator" class="animate__animated animate__zoomIn" style="max-width: 400px; margin: 0 auto; padding: 20px; background-color: #fff; border-radius: 8px; box-shadow: 0px 2px 5px rgba(0,0,0,0.1);">
            <input type="text" id="display" disabled style="width: 100%; height: 50px; font-size: 24px; text-align: right; margin-bottom: 20px; border-radius: 4px;">
            <div class="calculator-buttons" style="display: flex; flex-wrap: wrap;">
                <button class="calc-btn" onclick="clearDisplay()">C</button>
                <button class="calc-btn" onclick="appendSymbol('/')">/</button>
                <button class="calc-btn" onclick="appendSymbol('*')">*</button>
                <button class="calc-btn" onclick="deleteLast()">DEL</button>
                <button class="calc-btn" onclick="appendSymbol('7')">7</button>
                <button class="calc-btn" onclick="appendSymbol('8')">8</button>
                <button class="calc-btn" onclick="appendSymbol('9')">9</button>
                <button class="calc-btn" onclick="appendSymbol('-')">-</button>
                <button class="calc-btn" onclick="appendSymbol('4')">4</button>
                <button class="calc-btn" onclick="appendSymbol('5')">5</button>
                <button class="calc-btn" onclick="appendSymbol('6')">6</button>
                <button class="calc-btn" onclick="appendSymbol('+')">+</button>
                <button class="calc-btn" onclick="appendSymbol('1')">1</button>
                <button class="calc-btn" onclick="appendSymbol('2')">2</button>
                <button class="calc-btn" onclick="appendSymbol('3')">3</button>
                <button class="calc-btn" onclick="calculate()">=</button>
                <button class="calc-btn" onclick="appendSymbol('0')" style="width: calc(50% - 10px); margin-right: 10px;">0</button>
                <button class="calc-btn" onclick="appendSymbol('.')">.</button>
            </div>
        </div>
    </main>
    <style>
        .calc-btn {
            width: calc(25% - 10px);
            margin: 5px;
            padding: 10px;
            font-size: 18px;
            background-color: #2F4F4F;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }
        .calc-btn:hover {
            background-color: #4f6363;
        }
        .calc-btn:active {
            transform: scale(0.98);
        }
    </style>
    <script src="../js/calculator.js"></script>
    <footer class="animate__animated animate__fadeInUp" style="background-color: #8B0000; color: white; text-align: center; padding: 20px 0;">
        <p>&copy; 2023 Game of Thrones Fan Site</p>
    </footer>
</body>
</html>
